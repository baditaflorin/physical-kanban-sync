<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Physical Kanban Sync</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: #f6f1e8;
        color: #22211f;
      }
      main {
        width: min(840px, calc(100vw - 32px));
      }
      h1 {
        font-size: clamp(2rem, 8vw, 4.6rem);
        line-height: 0.95;
        margin: 0 0 20px;
      }
      p {
        max-width: 640px;
        font-size: 1.15rem;
        line-height: 1.6;
      }
      a {
        color: #065f73;
        font-weight: 700;
      }
      .links {
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
        margin-top: 28px;
      }
      .links a {
        border: 2px solid #22211f;
        border-radius: 8px;
        padding: 10px 14px;
        text-decoration: none;
        background: #fffdf6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Physical Kanban Sync</h1>
      <p>
        Static GitHub Pages scaffold is live. The full browser app is being built
        in this repository.
      </p>
      <div class="links">
        <a href="https://github.com/baditaflorin/physical-kanban-sync">Star on GitHub</a>
        <a href="https://www.paypal.com/paypalme/florinbadita">Support on PayPal</a>
      </div>
    </main>
  </body>
</html>
